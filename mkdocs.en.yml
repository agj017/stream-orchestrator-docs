site_name: Stream Orchestrator Docs
site_description: Architecture and operations documentation for Stream Orchestrator.
repo_url: https://github.com/agj017/stream-orchestrator-docs
site_url: https://agj017.github.io/stream-orchestrator-docs/en/
docs_dir: content/en
site_dir: site/en
theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
extra:
  alternate:
    - name: English
      link: /stream-orchestrator-docs/en/
      lang: en
    - name: 한국어
      link: /stream-orchestrator-docs/ko/
      lang: ko
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
nav:
  - Overview: index.md
  - Architecture: architecture.md
  - Stream State Model: state-model.md
