<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Stream Orchestrator Architecture</title>
  <desc id="desc">Simplified architecture diagram showing user entry points, orchestration services, data layer, streaming layer, and monitoring.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#263241"/>
    </marker>
    <style>
      .bg { fill: #f7f9fc; }
      .title { fill: #111827; font: 700 28px Arial, sans-serif; text-anchor: middle; }
      .subtitle { fill: #5b6573; font: 15px Arial, sans-serif; text-anchor: middle; }
      .group { fill: #ffffff; stroke: #d8dee8; stroke-width: 2; rx: 18; }
      .group-title { fill: #334155; font: 700 17px Arial, sans-serif; text-anchor: middle; }
      .box { fill: #f3f7fb; stroke: #94a3b8; stroke-width: 2; rx: 14; }
      .primary { fill: #edf6ff; stroke: #2f6fed; }
      .data { fill: #fff5eb; stroke: #ea8a2f; }
      .stream { fill: #ecfbf4; stroke: #22a66a; }
      .monitor { fill: #fffbea; stroke: #d5a514; }
      .label { fill: #111827; font: 700 18px Arial, sans-serif; text-anchor: middle; }
      .hint { fill: #64748b; font: 14px Arial, sans-serif; text-anchor: middle; }
      .flow { fill: none; stroke: #263241; stroke-width: 2.4; marker-end: url(#arrow); }
      .soft-flow { fill: none; stroke: #718096; stroke-width: 2; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .flow-label { fill: #475569; font: 13px Arial, sans-serif; text-anchor: middle; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="720"/>
  <text class="title" x="600" y="48">Stream Orchestrator</text>
  <text class="subtitle" x="600" y="74">Simplified system architecture</text>

  <rect class="group" x="48" y="132" width="198" height="392"/>
  <text class="group-title" x="147" y="166">Entry Points</text>
  <rect class="box" x="82" y="210" width="130" height="66"/>
  <text class="label" x="147" y="238">Dashboard</text>
  <text class="hint" x="147" y="258">operators</text>
  <rect class="box" x="82" y="378" width="130" height="66"/>
  <text class="label" x="147" y="406">HLS Client</text>
  <text class="hint" x="147" y="426">viewers</text>

  <rect class="group" x="314" y="112" width="334" height="432"/>
  <text class="group-title" x="481" y="146">Orchestration</text>
  <rect class="box primary" x="372" y="194" width="218" height="70"/>
  <text class="label" x="481" y="222">orchestrator-api</text>
  <text class="hint" x="481" y="243">stream lifecycle API</text>
  <rect class="box primary" x="372" y="326" width="218" height="70"/>
  <text class="label" x="481" y="354">Workers</text>
  <text class="hint" x="481" y="375">publisher, provisioner</text>
  <rect class="box primary" x="372" y="446" width="218" height="70"/>
  <text class="label" x="481" y="474">stream-gateway</text>
  <text class="hint" x="481" y="495">HLS reverse proxy</text>

  <rect class="group" x="714" y="112" width="206" height="432"/>
  <text class="group-title" x="817" y="146">Data Layer</text>
  <rect class="box data" x="752" y="220" width="130" height="78"/>
  <text class="label" x="817" y="250">PostgreSQL</text>
  <text class="hint" x="817" y="271">streams</text>
  <rect class="box data" x="752" y="372" width="130" height="78"/>
  <text class="label" x="817" y="402">RabbitMQ</text>
  <text class="hint" x="817" y="423">events</text>

  <rect class="group" x="982" y="112" width="170" height="432"/>
  <text class="group-title" x="1067" y="146">Streaming</text>
  <rect class="box stream" x="1012" y="270" width="110" height="86"/>
  <text class="label" x="1067" y="301">MediaMTX</text>
  <text class="hint" x="1067" y="322">pods</text>
  <text class="hint" x="1067" y="342">HLS/API</text>

  <rect class="group" x="314" y="584" width="838" height="82"/>
  <text class="group-title" x="733" y="616">Monitoring and Reconciliation</text>
  <text class="hint" x="733" y="645">stream-scaler, instance-reconciler, Prometheus, Grafana keep capacity and health in sync</text>

  <path class="flow" d="M 212 243 L 372 229"/>
  <text class="flow-label" x="292" y="220">create/list/stop</text>
  <path class="flow" d="M 590 229 L 752 259"/>
  <text class="flow-label" x="671" y="232">state</text>
  <path class="flow" d="M 817 298 L 817 372"/>
  <text class="flow-label" x="862" y="340">outbox</text>
  <path class="flow" d="M 752 411 L 590 361"/>
  <text class="flow-label" x="674" y="405">events</text>
  <path class="flow" d="M 590 361 L 1012 313"/>
  <text class="flow-label" x="800" y="326">configure paths</text>

  <path class="flow" d="M 212 411 L 372 481"/>
  <text class="flow-label" x="292" y="470">playback</text>
  <path class="flow" d="M 590 481 L 1012 325"/>
  <text class="flow-label" x="802" y="425">proxy HLS</text>

  <path class="soft-flow" d="M 734 584 C 760 520 845 466 1012 352"/>
  <text class="flow-label" x="850" y="552">observe / scale</text>
</svg>
