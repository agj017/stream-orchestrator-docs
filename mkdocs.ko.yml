site_name: Stream Orchestrator Docs
site_description: Stream Orchestrator 아키텍처, 배포, 운영 문서.
repo_url: https://github.com/agj017/stream-orchestrator-docs
site_url: https://agj017.github.io/stream-orchestrator-docs/ko/
docs_dir: content/ko
site_dir: site/ko
theme:
  name: material
  language: ko
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
extra:
  alternate:
    - name: English
      link: /stream-orchestrator-docs/en/
      lang: en
    - name: 한국어
      link: /stream-orchestrator-docs/ko/
      lang: ko
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
nav:
  - 개요: index.md
  - 아키텍처: architecture.md
  - 스트림 상태 모델: state-model.md
  - 배포:
      - GitHub Pages: deployment/github-pages.md
