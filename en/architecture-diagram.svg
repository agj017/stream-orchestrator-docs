<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="680" viewBox="0 0 1180 680" role="img" aria-labelledby="title desc">
  <title id="title">Stream Orchestrator Architecture</title>
  <desc id="desc">Simplified architecture diagram for Stream Orchestrator.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .subtitle { font: 15px Arial, sans-serif; fill: #64748b; text-anchor: middle; }
      .group { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 16; }
      .groupTitle { font: 700 16px Arial, sans-serif; fill: #334155; text-anchor: middle; }
      .box { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 2; rx: 12; }
      .blue { fill: #eff6ff; stroke: #2563eb; }
      .orange { fill: #fff7ed; stroke: #ea580c; }
      .green { fill: #ecfdf5; stroke: #059669; }
      .yellow { fill: #fefce8; stroke: #ca8a04; }
      .label { font: 700 18px Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .hint { font: 14px Arial, sans-serif; fill: #64748b; text-anchor: middle; }
      .flow { fill: none; stroke: #334155; stroke-width: 2.4; marker-end: url(#arrow); }
      .soft { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .flowText { font: 13px Arial, sans-serif; fill: #475569; text-anchor: middle; }
    </style>
  </defs>
  <rect class="bg" width="1180" height="680"/>
  <text class="title" x="590" y="44">Stream Orchestrator</text>
  <text class="subtitle" x="590" y="70">Documentation-level view of the stream control plane</text>
  <rect class="group" x="40" y="120" width="190" height="270"/>
  <text class="groupTitle" x="135" y="152">Entry</text>
  <rect class="box" x="72" y="185" width="126" height="62"/>
  <text class="label" x="135" y="212">Dashboard</text>
  <text class="hint" x="135" y="232">operators</text>
  <rect class="box" x="72" y="295" width="126" height="62"/>
  <text class="label" x="135" y="322">HLS Client</text>
  <text class="hint" x="135" y="342">viewers</text>
  <rect class="group" x="300" y="110" width="260" height="365"/>
  <text class="groupTitle" x="430" y="142">Control Plane</text>
  <rect class="box blue" x="335" y="180" width="190" height="64"/>
  <text class="label" x="430" y="207">API</text>
  <text class="hint" x="430" y="227">stream lifecycle</text>
  <rect class="box blue" x="335" y="285" width="190" height="64"/>
  <text class="label" x="430" y="312">Workers</text>
  <text class="hint" x="430" y="332">publish, provision</text>
  <rect class="box blue" x="335" y="390" width="190" height="64"/>
  <text class="label" x="430" y="417">Gateway</text>
  <text class="hint" x="430" y="437">HLS routing</text>
  <rect class="group" x="640" y="120" width="190" height="270"/>
  <text class="groupTitle" x="735" y="152">Data &amp; Events</text>
  <rect class="box orange" x="672" y="190" width="126" height="62"/>
  <text class="label" x="735" y="217">PostgreSQL</text>
  <text class="hint" x="735" y="237">state</text>
  <rect class="box orange" x="672" y="300" width="126" height="62"/>
  <text class="label" x="735" y="327">RabbitMQ</text>
  <text class="hint" x="735" y="347">events</text>
  <rect class="group" x="920" y="120" width="210" height="270"/>
  <text class="groupTitle" x="1025" y="152">Streaming</text>
  <rect class="box green" x="952" y="225" width="146" height="78"/>
  <text class="label" x="1025" y="254">MediaMTX</text>
  <text class="hint" x="1025" y="276">pods</text>
  <text class="hint" x="1025" y="294">HLS / API</text>
  <rect class="group" x="300" y="535" width="830" height="88"/>
  <text class="groupTitle" x="715" y="567">Observability &amp; Reconciliation</text>
  <rect class="box yellow" x="385" y="584" width="660" height="25"/>
  <text class="hint" x="715" y="602">stream-scaler, instance-reconciler, Prometheus, Grafana</text>
  <path class="flow" d="M198,216 L335,212"/>
  <text class="flowText" x="265" y="198">manage streams</text>
  <path class="flow" d="M525,212 L672,221"/>
  <text class="flowText" x="598" y="199">write state</text>
  <path class="flow" d="M735,252 L735,300"/>
  <text class="flowText" x="780" y="281">outbox</text>
  <path class="flow" d="M672,331 L525,317"/>
  <text class="flowText" x="598" y="347">consume</text>
  <path class="flow" d="M525,317 C655,285 800,265 952,264"/>
  <text class="flowText" x="745" y="263">configure paths</text>
  <path class="flow" d="M198,326 L335,422"/>
  <text class="flowText" x="258" y="392">playback</text>
  <path class="flow" d="M525,422 C675,420 825,330 952,277"/>
  <text class="flowText" x="760" y="414">proxy HLS</text>
  <path class="soft" d="M715,535 C770,470 875,390 1000,303"/>
  <text class="flowText" x="855" y="493">observe / scale</text>
</svg>
